<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Show Hide Password</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        background-color: #121212;
        color: #fff;
      }
      h1 {
        text-align: center;
      }
      .container {
        width: 400px;
        height: 320px;
        background-color: #1e1e2f;
        border-radius: 15px;
        padding: 10px 15px;
      }
      form {
        margin: 22px 0px;
      }
      .field {
        display: flex;
        flex-direction: column;
        position: relative;
      }
      .field > label {
        font-size: 18px;
        margin: 8px 0px;
      }
      .field > input {
        height: 42px;
        border-radius: 8px;
        background-color: #d3d3d3;
        cursor: pointer;
        border: 1px solid #000;
        padding: 0 40px 0 10px;
      }
      .field > button {
        position: absolute;
        right: 10px;
        top: 75%;
        transform: translateY(-50%);
        border: none;
        background: transparent;
        cursor: pointer;
        color: #000;
      }
      #login {
        background-color: #4f46e5;
        width: 370px;
        height: 42px;
        color: #fff;
        margin-top: 25px;
        border-radius: 12px;
        cursor: pointer;
        font-size: 16px;
        letter-spacing: 1px;
      }
      .field > input[placeholder] {
        padding: 0px 10px;
      }
      #message {
        margin: 20px 0px;
        font-size: 24px;
      }
    </style>
  </head>
  <body>
    <p id="message"></p>
    <div class="container">
      <h1>Login Form</h1>
      <form id="form">
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="Enter Email" />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter Password" />
          <button type="button" id="shp">Show</button>
        </div>

        <button type="submit" id="login">Login</button>
      </form>
    </div>
    <script src="app.js"></script>
  </body>
</html>
